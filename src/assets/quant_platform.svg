<svg xmlns="http://www.w3.org/2000/svg" width="640" height="400" viewBox="0 0 640 400" font-family="Helvetica Neue, Inter, Arial, sans-serif">
  <rect width="640" height="400" fill="#FFFFFF"/>

  <text x="40" y="46" font-size="22" font-weight="700" fill="#0F172A">Data Platform &amp; AI Agents</text>
  <text x="40" y="68" font-size="13" fill="#64748B">one governed home for the data, plus agents that do the rote research work</text>

  <line x1="40" y1="84" x2="600" y2="84" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Left card: governed data platform -->
  <g>
    <rect x="40" y="106" width="270" height="254" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="40" y="106" width="270" height="4" fill="#2563EB"/>
    <text x="60" y="136" font-size="12" font-weight="700" fill="#2563EB">GOVERNED DATA PLATFORM</text>

    <text x="60" y="182" font-size="32" font-weight="700" fill="#0F172A">170+</text>
    <text x="60" y="202" font-size="11" fill="#64748B">datasets</text>
    <text x="185" y="182" font-size="32" font-weight="700" fill="#0F172A">15+</text>
    <text x="185" y="202" font-size="11" fill="#64748B">years of history</text>

    <line x1="60" y1="222" x2="290" y2="222" stroke="#E2E8F0" stroke-width="1"/>

    <circle cx="66" cy="246" r="3" fill="#2563EB"/>
    <text x="78" y="250" font-size="10" fill="#334155">three-zone AWS S3 layout: raw, curated, research</text>
    <circle cx="66" cy="272" r="3" fill="#2563EB"/>
    <text x="78" y="276" font-size="10" fill="#334155">5 guard classes, attack-tested in CI</text>
    <circle cx="66" cy="298" r="3" fill="#2563EB"/>
    <text x="78" y="302" font-size="10" fill="#334155">guards block lookahead bias and data leakage</text>
    <circle cx="66" cy="324" r="3" fill="#2563EB"/>
    <text x="78" y="328" font-size="10" fill="#334155">every result traces back to versioned inputs</text>
  </g>

  <!-- Right card: agent fleet -->
  <g>
    <rect x="330" y="106" width="270" height="254" rx="6" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="330" y="106" width="270" height="4" fill="#2563EB"/>
    <text x="350" y="136" font-size="12" font-weight="700" fill="#2563EB">CLAUDE CODE AGENT FLEET</text>

    <rect x="350" y="152" width="230" height="58" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="350" y="152" width="4" height="58" fill="#2563EB"/>
    <text x="366" y="174" font-size="12" font-weight="700" fill="#0F172A">Portfolio-Fit Screener</text>
    <text x="366" y="190" font-size="10" fill="#64748B">does a candidate edge actually add</text>
    <text x="366" y="203" font-size="10" fill="#64748B">anything to the existing book?</text>

    <rect x="350" y="220" width="230" height="58" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="350" y="220" width="4" height="58" fill="#2563EB"/>
    <text x="366" y="242" font-size="12" font-weight="700" fill="#0F172A">Post-Trade Attribution</text>
    <text x="366" y="258" font-size="10" fill="#64748B">explains why an asset moved, with</text>
    <text x="366" y="271" font-size="10" fill="#64748B">ranked causes and confidence</text>

    <rect x="350" y="288" width="230" height="58" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
    <rect x="350" y="288" width="4" height="58" fill="#10B981"/>
    <text x="366" y="310" font-size="12" font-weight="700" fill="#0F172A">Meta-Agent</text>
    <text x="366" y="326" font-size="10" fill="#64748B">researches a domain, distills a quality</text>
    <text x="366" y="339" font-size="10" fill="#64748B">framework, then authors new agents</text>
  </g>

  <text x="320" y="386" font-size="11" fill="#64748B" text-anchor="middle">the platform enforces the process: pre-registered specs in, versioned and reproducible results out</text>
</svg>
